name: lilly
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.3.3
  http: ^1.2.2
  flutter_web_auth_2: ^4.0.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  crypto: ^3.0.5
  flutter_downloader: ^1.11.8
  flutter_tts: ^4.2.3
  speech_to_text: ^7.2.0
  google_mlkit_text_recognition: ^0.15.0
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/lilly_logo.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/lilly_logo.jpg
  min_sdk_android: 24
